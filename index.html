<script>
async function sendCommand() {
 const command = document.getElementById('commandInput').value;
 if (!command) return alert("Command is empty");

 const repo = "REAPERTARGET";
 const owner = "askyokimis";
 const token = "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";
 const url = `https://api.github.com/repos/${owner}/${repo}/dispatches`;
 const body = {
  event_type: "new_command",
  client_payload: { command: command }
 };

 const response = await fetch(url, {
  method: "POST",
  headers: {
   "Accept": "application/vnd.github+json",
   "Authorization": `token ${token}`,
   "Content-Type": "application/json"
  },
  body: JSON.stringify(body)
 });

 if (response.ok) {
  alert("Command sent successfully!");
  document.getElementById('commandInput').value = "";
 } else {
  alert("Error sending command: " + response.statusText);
 }
}
</script>
